kind = "web"
previewPath = "/"
title = "CraKa OSINT Portal"
version = "1.0.0"
id = "artifacts/craka-osint"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24042

[services.development]
run = "pnpm --filter @workspace/craka-osint run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/craka-osint", "run", "build" ]
publicDir = "artifacts/craka-osint/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24042"
BASE_PATH = "/"
